<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- outer ring -->
  <circle cx="50" cy="50" r="33" fill="none" stroke="#555555" stroke-width="1.2" opacity="0.4"/>
  <!-- inner ring -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#555555" stroke-width="0.8" opacity="0.3"/>
  <!-- N needle (white) -->
  <polygon points="50,18 45,50 50,46 55,50" fill="#EEEEEE" opacity="0.9"/>
  <!-- S needle (dark) -->
  <polygon points="50,82 45,50 50,54 55,50" fill="#AAAAAA" opacity="0.45"/>
  <!-- tick marks -->
  <line x1="50" y1="13" x2="50" y2="20" stroke="#EEEEEE" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="50" y1="80" x2="50" y2="87" stroke="#EEEEEE" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="50" x2="20" y2="50" stroke="#EEEEEE" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="80" y1="50" x2="87" y2="50" stroke="#EEEEEE" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <!-- pink center -->
  <circle cx="50" cy="50" r="5.5" fill="#FF3D6B"/>

</svg>