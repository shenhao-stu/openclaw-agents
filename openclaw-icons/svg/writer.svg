<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- page shadow -->
  <rect x="24" y="18" width="46" height="60" rx="5" fill="#333333" opacity="0.5"/>
  <!-- page body -->
  <rect x="20" y="15" width="46" height="60" rx="5" fill="#EEEEEE" opacity="0.88"/>
  <!-- folded corner -->
  <polygon points="50,15 66,15 66,30" fill="#AAAAAA" opacity="0.4"/>
  <polygon points="50,15 66,30 50,30" fill="#555555" opacity="0.3"/>
  <!-- text lines -->
  <line x1="28" y1="38" x2="58" y2="38" stroke="#555555" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="28" y1="46" x2="58" y2="46" stroke="#555555" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="28" y1="54" x2="48" y2="54" stroke="#555555" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <!-- pen body -->
  <rect x="52" y="54" width="7" height="28" rx="3" transform="rotate(-42 52 54)" fill="#EEEEEE" opacity="0.88"/>
  <!-- pen nib -->
  <polygon points="48,83 53,76 58,83" fill="#FF3D6B"/>
  <!-- ink dot -->
  <circle cx="73" cy="47" r="4.5" fill="#FF3D6B"/>

</svg>