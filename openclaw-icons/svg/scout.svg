<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- telescope barrel (rotated rect via path) -->
  <rect x="10" y="42" width="56" height="15" rx="7.5"
    fill="#EEEEEE" opacity="0.82" transform="rotate(-30 38 49.5)"/>
  <rect x="10" y="49" width="56" height="8" rx="4"
    fill="#555555" opacity="0.35" transform="rotate(-30 38 53)"/>
  <!-- eyepiece ring -->
  <circle cx="25" cy="66" r="8" fill="none" stroke="#EEEEEE" stroke-width="3.5" opacity="0.6"/>
  <!-- target circle -->
  <circle cx="78" cy="28" r="9" fill="none" stroke="#FF3D6B" stroke-width="2.5"/>
  <!-- crosshair -->
  <line x1="78" y1="15" x2="78" y2="22" stroke="#FF3D6B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="78" y1="34" x2="78" y2="41" stroke="#FF3D6B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="65" y1="28" x2="72" y2="28" stroke="#FF3D6B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="84" y1="28" x2="91" y2="28" stroke="#FF3D6B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <circle cx="78" cy="28" r="4" fill="#FF3D6B"/>

</svg>