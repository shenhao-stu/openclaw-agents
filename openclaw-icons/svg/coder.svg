<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- terminal window -->
  <rect x="12" y="20" width="76" height="60" rx="8" fill="#333333" opacity="0.85"/>
  <!-- title bar -->
  <rect x="12" y="20" width="76" height="18" rx="8" fill="#555555" opacity="0.5"/>
  <!-- traffic lights -->
  <circle cx="25" cy="29" r="3.5" fill="#AAAAAA" opacity="0.35"/>
  <circle cx="36" cy="29" r="3.5" fill="#FF3D6B"/>
  <circle cx="47" cy="29" r="3.5" fill="#AAAAAA" opacity="0.35"/>
  <!-- prompt chevron -->
  <polyline points="22,50 33,58 22,66"
    fill="none" stroke="#EEEEEE" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- code lines -->
  <line x1="38" y1="66" x2="60" y2="66" stroke="#AAAAAA" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="38" y1="57" x2="72" y2="57" stroke="#AAAAAA" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="48" x2="55" y2="48" stroke="#AAAAAA" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>

</svg>