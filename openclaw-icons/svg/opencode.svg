<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- hexagon -->
  <polygon points="50,12 78,27 78,70 50,85 22,70 22,27"
    fill="#333333" opacity="0.6"/>
  <polygon points="50,12 78,27 78,70 50,85 22,70 22,27"
    fill="none" stroke="#AAAAAA" stroke-width="1.5" opacity="0.35"/>
  <!-- diamond -->
  <polygon points="50,30 64,50 50,70 36,50" fill="#555555" opacity="0.35"/>
  <!-- < > brackets -->
  <polyline points="36,42 26,50 36,58"
    fill="none" stroke="#EEEEEE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="64,42 74,50 64,58"
    fill="none" stroke="#EEEEEE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- slash -->
  <line x1="57" y1="36" x2="43" y2="64" stroke="#AAAAAA" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- nodes -->
  <circle cx="50" cy="85" r="5.5" fill="#FF3D6B"/>
  <circle cx="22" cy="27" r="3.5" fill="#AAAAAA" opacity="0.35"/>
  <circle cx="78" cy="27" r="3.5" fill="#AAAAAA" opacity="0.35"/>

</svg>