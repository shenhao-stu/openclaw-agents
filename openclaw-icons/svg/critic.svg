<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#111111"/>
  
  <!-- lens fill -->
  <circle cx="42" cy="42" r="23" fill="#333333" opacity="0.7"/>
  <!-- lens ring -->
  <circle cx="42" cy="42" r="23" fill="none" stroke="#EEEEEE" stroke-width="5" opacity="0.88"/>
  <!-- X cross -->
  <line x1="34" y1="34" x2="50" y2="50" stroke="#EEEEEE" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="34" x2="34" y2="50" stroke="#EEEEEE" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  <!-- handle -->
  <line x1="59" y1="59" x2="80" y2="80" stroke="#EEEEEE" stroke-width="7" stroke-linecap="round" opacity="0.82"/>
  <!-- pink end -->
  <circle cx="80" cy="80" r="5.5" fill="#FF3D6B"/>

</svg>