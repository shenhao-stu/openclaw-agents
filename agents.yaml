# ============================================================
# OpenClaw Agents �?Multi-Agent Configuration Manifest
# ============================================================
# This file defines all agents, their properties, and routing.
# Used by setup.sh to auto-provision the entire agent fleet.
# ============================================================

# ── Global Settings ──────────────────────────────────────────
project:
  name: "openclaw-agents"
  version: "4.2.0"
  description: "OpenClaw agent fleet with Discord parent-thread/child-thread SOP"
  default_model: "zai/glm-5"

# ── Agent Definitions ────────────────────────────────────────
# Each agent has:
#   - id:          unique agent identifier (used in openclaw commands)
#   - name:        human-readable display name (used in channel identity)
#   - emoji:       visual identifier for quick recognition
#   - role:        brief role description
#   - model:       LLM model to use (override global default)
#   - protected:   if true, core agent that cannot be removed
#   - workspace:   relative workspace path

agents:
  # ── Main Agent (root-level soul.md) ──
  - id: "main"
    name: "🐾 OpenClaw"
    emoji: "🐾"
    role: "System orchestrator, audit, and final arbiter"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: "."
    default: true

  # ── Core Sub-Agents ──
  - id: "planner"
    name: "🧠 Planner"
    emoji: "🧠"
    role: "Task decomposition, progress tracking, cross-agent coordination"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/planner"

  - id: "ideator"
    name: "💡 Ideator"
    emoji: "💡"
    role: "Idea generation, novelty assessment, contribution refinement"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/ideator"

  - id: "critic"
    name: "🎯 Critic"
    emoji: "🎯"
    role: "SHARP taste evaluation, soul questions, anti-pattern detection"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/critic"

  - id: "surveyor"
    name: "📚 Surveyor"
    emoji: "📚"
    role: "Literature search, paper analysis, research gap identification"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/surveyor"

  - id: "coder"
    name: "💻 Coder"
    emoji: "💻"
    role: "Algorithm implementation, experiment execution, code optimization"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/coder"

  - id: "writer"
    name: "✍️ Writer"
    emoji: "✍️"
    role: "Paper writing, LaTeX formatting, academic expression"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/writer"

  - id: "reviewer"
    name: "🔍 Reviewer"
    emoji: "🔍"
    role: "Internal peer review, weakness diagnosis, rebuttal strategy"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/reviewer"

  - id: "scout"
    name: "📰 Scout"
    emoji: "📰"
    role: "Daily paper digest, trend analysis, competitive intelligence"
    model: "ohmyapi/gpt-5.4"
    protected: true
    workspace: ".agents/scout"

# ── Channel Binding Templates ────────────────────────────────
# Supported channels: feishu, whatsapp, telegram, discord, slack
# peer.kind: "group" or "direct"
# peer.id: channel-specific group/user ID
#
# Feishu IDs:
#   - Group (chat_id): oc_xxxxxxxxx
#   - User  (open_id): ou_xxxxxxxxx
#
# WhatsApp IDs:
#   - Group: 120363999999999999@g.us
#   - User:  +15551234567
#
# Telegram IDs:
#   - Group: -1001234567890
#   - User:  123456789
#
# Discord IDs:
#   - Guild: 1234567890
#   - Channel: 1234567890

bindings:
  # Example: bind all agents to a Feishu group
  # Uncomment and fill in your group ID:
  #
  # - agentId: "main"
  #   match:
  #     channel: "feishu"
  #     peer:
  #       kind: "group"
  #       id: "oc_your_group_id_here"

  # Example: bind a specific agent to a specific peer
  # - agentId: "scout"
  #   match:
  #     channel: "feishu"
  #     peer:
  #       kind: "direct"
  #       id: "ou_your_user_id_here"
